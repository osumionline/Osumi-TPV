<div class="empleados-list">
    @for (empleado of empleados(); track empleado.id) {
    <div class="empleado"
         [style]="{'background-color': empleado.color, 'color': empleado.textColor}"
         (click)="abreLogin(empleado)"
         [id]="`empleado_${empleado.id}`">
        {{ empleado.nombre }}
    </div>
    }
</div>
